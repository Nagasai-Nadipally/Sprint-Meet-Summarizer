server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed static assets aggressively
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # SPA fallback: let Angular's router handle deep links
    location / {
        try_files $uri $uri/ /index.html;
    }
}
