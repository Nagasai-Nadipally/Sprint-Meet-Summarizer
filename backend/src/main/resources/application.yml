spring:
  application:
    name: meeting-notes-ai

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/meeting_notes}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' is convenient for local dev. Use a migration tool (Flyway/Liquibase)
      # and set this to 'validate' for production.
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:100MB}
      max-request-size: ${MAX_REQUEST_SIZE:105MB}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    # Base64-encoded secret, must decode to >= 256 bits. Generate one with:
    #   openssl rand -base64 32
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtb25seS1zZWNyZXQtMTIzNDU2Nzg5MA==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    whisper-model: ${WHISPER_MODEL:whisper-1}
    gpt-model: ${GPT_MODEL:gpt-4o-mini}

  storage:
    local-dir: ${STORAGE_DIR:./uploads}

  mail:
    from: ${MAIL_FROM:no-reply@meetingnotes.local}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.meetingnotes: INFO
